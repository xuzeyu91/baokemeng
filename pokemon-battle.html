<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝可梦卡牌对战</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="battle-fx.css">
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="title">
      <div class="logo"></div>
      <div>
        <h1>宝可梦卡牌对战</h1>
        <small>初代 + 城都 251 只宝可梦 · 属性克制 · 你 VS 电脑</small>
      </div>
    </div>
    <button class="btn ghost" onclick="PK.toSetup()">重选宝可梦</button>
  </header>
  <div class="field">
    <div class="side you" id="you-side"></div>
    <div class="vs">VS</div>
    <div class="side ai" id="ai-side"></div>
  </div>
  <div class="actions">
    <div class="move-area">
      <div class="ttl" id="turn-indicator">准备中…</div>
      <div class="moves" id="moves"></div>
      <div class="switch-hint" id="switch-hint"></div>
    </div>
    <div class="log-area">
      <div class="ttl">战斗记录</div>
      <div class="log" id="log"></div>
    </div>
  </div>
  <div class="foot">提示：绿色技能克制当前对手；能量不足的技能会变灰。另有「聚气·回复能量」支援技（0 消耗、恢复 2 能量）。每回合自动恢复 1 点能量，攒满 5 点可放 3 费大招。</div>
</div>
<div class="overlay" id="overlay"><div class="over-box" id="over-box"></div></div>
<div class="overlay setup" id="setup">
  <div class="setup-box">
    <button class="setup-close" id="setup-close">✕</button>
    <h2>组建你的宝可梦战队</h2>
    <p class="setup-sub">从初代 + 城都共 251 只中选择，或让系统随机分配。</p>
    <div class="setup-modes">
      <button class="seg" id="seg-random">⚡ 随机组队</button>
      <button class="seg" id="seg-custom">✋ 自选 12 只</button>
    </div>
    <div id="custom-panel" class="hidden">
      <div class="picker-tools">
        <input id="pk-search" class="pk-search" placeholder="搜索名字或编号…" />
        <div class="pk-tools-btns">
          <button class="mini-btn" id="pk-fill">随机补全</button>
          <button class="mini-btn ghost" id="pk-clear">清空</button>
        </div>
      </div>
      <div id="pk-gen" class="gen-filters"></div>
      <div id="pk-types" class="type-filters"></div>
      <div id="pk-grid" class="pk-grid"></div>
      <div class="pick-foot">已选 <b id="pick-count">0</b> / 12</div>
    </div>
    <div class="setup-actions"><button class="btn start-btn" id="start-btn">开始对战</button></div>
  </div>
</div>
<div id="pk-preview" class="pk-preview"></div>
<div id="fx"></div>
<canvas id="fx3d"></canvas>
<script src="data.js"></script>
<script src="battle-fx.js"></script>
<script src="game.js"></script>
</body>
</html>

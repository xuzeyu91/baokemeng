<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝可梦卡牌对战</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg1: #1b2a4a;
  --bg2: #0e1630;
  --panel: #ffffff;
  --ink: #1c2536;
  --muted: #6b7689;
  --accent: #ffcb05;
  --accent2: #3b6fd6;
  --hp-good: #46c46a;
  --hp-mid: #f2c14e;
  --hp-low: #e3534a;
  --shadow: 0 8px 24px rgba(0,0,0,.28);
}

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
  background: radial-gradient(1200px 700px at 50% -10%, #2a3f6e 0%, var(--bg1) 40%, var(--bg2) 100%);
  color: var(--ink);
  min-height: 100vh;
  padding: 18px 14px 40px;
}

.wrap { max-width: 1080px; margin: 0 auto; }

header.top {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
}
.title {
  display: flex; align-items: center; gap: 12px;
  color: #fff;
}
.title .logo {
  width: 42px; height: 42px; border-radius: 50%;
  background: radial-gradient(circle at 50% 38%, #fff 0 30%, #e3534a 31% 100%);
  border: 3px solid #fff; box-shadow: var(--shadow);
  position: relative;
}
.title .logo::after {
  content: ""; position: absolute; left: -3px; right: -3px; top: 50%;
  height: 3px; background: #fff; transform: translateY(-50%);
}
.title h1 { font-size: 22px; letter-spacing: .5px; }
.title small { display:block; font-weight: 400; font-size: 12px; color: #b9c6e6; }

button.btn {
  cursor: pointer; border: none; border-radius: 10px;
  padding: 10px 16px; font-size: 14px; font-weight: 700;
  background: var(--accent); color: #3a2d00; transition: transform .08s, filter .15s;
  box-shadow: 0 4px 0 #c79a00;
}
button.btn:hover { filter: brightness(1.05); }
button.btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c79a00; }
button.btn.ghost { background: #2b3c63; color: #fff; box-shadow: 0 4px 0 #16213c; }
button.btn:disabled { opacity: .45; cursor: not-allowed; filter: grayscale(.4); box-shadow: none; }

/* Battle field */
.field {
  display: grid; grid-template-columns: 1fr 64px 1fr; gap: 10px; align-items: stretch;
  margin-bottom: 14px;
}
.side { display: flex; flex-direction: column; gap: 10px; }
.side.you { align-items: flex-start; }
.side.ai  { align-items: flex-end; }

.side-label {
  color:#fff; font-weight:700; font-size:13px; letter-spacing:1px;
  display:flex; align-items:center; gap:8px; opacity:.92;
}
.side-label .tag { background:#0006; padding:2px 8px; border-radius:20px; font-size:11px; }

.vs {
  display:flex; align-items:center; justify-content:center; color:#fff;
  font-weight:800; font-style:italic; font-size:22px; opacity:.8;
}

/* Active card */
.card {
  width: 240px; background: var(--panel); border-radius: 16px; overflow: hidden;
  box-shadow: var(--shadow); border: 3px solid #fff; position: relative;
}
.card .head {
  padding: 10px 12px; color:#fff; display:flex; justify-content:space-between; align-items:center;
}
.card .head .nm { font-weight: 800; font-size: 16px; text-shadow: 0 1px 2px #0006; }
.card .head .no { font-size: 12px; opacity:.85; font-weight:700; }
.card .art {
  background: linear-gradient(180deg,#f3f5fb,#dfe5f2);
  height: 132px; display:flex; align-items:center; justify-content:center; position:relative;
}
.card .art img { width: 118px; height: 118px; object-fit: contain; image-rendering: pixelated; }
.card .art .fallback {
  display:none; width:96px; height:96px; border-radius:50%;
  background: radial-gradient(circle at 50% 38%, #fff 0 30%, #e3534a 31% 100%);
  border:4px solid #fff; align-items:center; justify-content:center;
  color:#fff; font-weight:800; font-size:18px;
}
.card .types { display:flex; gap:6px; padding: 8px 12px 4px; flex-wrap:wrap; }
.type-chip {
  font-size: 11px; font-weight:700; color:#fff; padding:3px 9px; border-radius:20px;
}
.card .body { padding: 4px 12px 12px; }
.hp-row { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); font-weight:700; }
.hp-bar { flex:1; height: 12px; background:#e6e9f0; border-radius:8px; overflow:hidden; }
.hp-fill { height:100%; background: var(--hp-good); transition: width .45s ease; }
.energy { display:flex; gap:5px; margin-top:8px; align-items:center; }
.energy .lbl { font-size:11px; color:var(--muted); font-weight:700; }
.energy .dot { width:13px; height:13px; border-radius:50%; background:#d7dce6; border:1px solid #c2c8d4; }
.energy .dot.on { background: radial-gradient(circle at 30% 30%, #ffe27a, #f0a800); border-color:#c98a00; box-shadow:0 0 6px #ffcf3a; }

/* Bench */
.bench { display:flex; gap:8px; flex-wrap:wrap; }
.mini {
  width: 92px; background: var(--panel); border-radius: 10px; overflow:hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,.18); border:2px solid #fff; cursor: default;
  transition: transform .1s;
}
.mini.switchable { cursor: pointer; }
.mini.switchable:hover { transform: translateY(-3px); border-color: var(--accent); }
.mini .mh { padding:5px 7px; color:#fff; font-size:11px; font-weight:700; display:flex; justify-content:space-between; }
.mini .ma { height:54px; background:#eef1f8; display:flex; align-items:center; justify-content:center; }
.mini .ma img { width:48px; height:48px; object-fit:contain; image-rendering:pixelated; }
.mini .ma .fb { display:none; width:38px; height:38px; border-radius:50%; background: radial-gradient(circle at 50% 38%, #fff 0 30%, #e3534a 31% 100%); border:2px solid #fff; }
.mini .mb { padding:4px 7px 6px; }
.mini .mhp { height:7px; background:#e6e9f0; border-radius:5px; overflow:hidden; }
.mini .mhp i { display:block; height:100%; background:var(--hp-good); }
.mini .mname { font-size:10px; color:var(--ink); font-weight:700; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.deck-pile {
  display:flex; align-items:center; gap:6px; color:#cdd7ee; font-size:12px; font-weight:700;
}
.deck-pile .pile {
  width:34px; height:46px; border-radius:6px; background:
    repeating-linear-gradient(45deg,#2b3c63 0 6px,#243457 6px 12px);
  border:2px solid #fff; box-shadow:0 3px 6px #0004;
}

/* Action panel */
.actions {
  background: var(--panel); border-radius: 16px; padding: 14px;
  box-shadow: var(--shadow); display:grid; grid-template-columns: 1fr 280px; gap: 14px;
}
.move-area .ttl, .log-area .ttl { font-size:13px; font-weight:800; color:var(--muted); margin-bottom:8px; letter-spacing:1px; }
.moves { display:flex; gap:10px; flex-wrap:wrap; }
.move {
  flex:1; min-width: 200px; text-align:left; border:2px solid #e3e8f2; border-radius:12px;
  padding:10px 12px; background:#f7f9fd; cursor:pointer; transition: .12s;
}
.move:hover:not(:disabled) { border-color: var(--accent2); background:#eef3ff; }
.move:disabled { opacity:.5; cursor:not-allowed; }
.move .mn { font-weight:800; font-size:14px; display:flex; align-items:center; gap:8px; }
.move .md { font-size:12px; color:var(--muted); margin-top:4px; display:flex; gap:10px; }
.move .eff { font-size:11px; font-weight:800; margin-top:4px; }
.move .eff.sup { color:#d23b2e; }
.move .eff.weak { color:#2f8f4e; }
.move .cost { margin-left:auto; font-size:11px; color:#9aa3b5; }

.switch-hint { font-size:12px; color:var(--muted); margin-top:10px; }
.switch-hint b { color:var(--accent2); }

.log-area { background:#0f1830; border-radius:12px; padding:10px 12px; color:#cdd7ee; }
.log-area .ttl { color:#9fb0d6; }
.log { font-size:12px; line-height:1.7; max-height: 220px; overflow:auto; }
.log .e { padding:2px 0; border-bottom:1px dashed #ffffff14; }
.log .e.you { color:#ffe08a; }
.log .e.ai { color:#9fd0ff; }
.log .e.sys { color:#b6c2dd; }
.log .e.kill { color:#ff8a7a; font-weight:700; }

/* Game over */
.overlay {
  position: fixed; inset:0; background:#0a0f1fcc; display:none;
  align-items:center; justify-content:center; z-index:50; backdrop-filter: blur(3px);
}
.overlay.show { display:flex; }
.over-box {
  background:#fff; border-radius:18px; padding:28px 34px; text-align:center; box-shadow:var(--shadow);
  max-width: 360px;
}
.over-box h2 { font-size:26px; margin-bottom:8px; }
.over-box p { color:var(--muted); margin-bottom:18px; }
.over-box .emoji { font-size:54px; margin-bottom:6px; }

.foot { color:#9fb0d6; text-align:center; font-size:12px; margin-top:16px; }

/* ===== Setup screen ===== */
.overlay.setup { background:#0a0f1fdd; }
.setup-box {
  position: relative;
  background: #fff; border-radius: 18px; padding: 22px 24px 20px;
  width: min(760px, 94vw); max-height: 90vh; overflow: auto;
  box-shadow: var(--shadow);
}
.setup-box h2 { font-size: 22px; color: var(--ink); }
.setup-sub { color: var(--muted); font-size: 13px; margin: 4px 0 14px; }
.setup-close {
  position: absolute; top: 12px; right: 12px; width: 30px; height: 30px;
  border: none; border-radius: 8px; background: #eef1f8; color: #6b7689;
  font-size: 15px; cursor: pointer; font-weight: 700;
}
.setup-close:hover { background: #e1e6f0; }

.setup-modes { display: flex; gap: 10px; margin-bottom: 14px; }
.seg {
  flex: 1; padding: 11px; border: 2px solid #e3e8f2; background: #f7f9fd;
  border-radius: 12px; font-size: 14px; font-weight: 800; color: var(--muted);
  cursor: pointer; transition: .12s;
}
.seg.active { border-color: var(--accent2); background: #eef3ff; color: var(--accent2); }

.picker-tools { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.pk-search {
  flex: 1; min-width: 200px; padding: 9px 12px; border: 2px solid #e3e8f2;
  border-radius: 10px; font-size: 13px; outline: none;
}
.pk-search:focus { border-color: var(--accent2); }
.pk-tools-btns { display: flex; gap: 6px; }
.mini-btn {
  padding: 9px 12px; border: none; border-radius: 10px; font-size: 12px; font-weight: 700;
  background: var(--accent2); color: #fff; cursor: pointer; white-space: nowrap;
}
.mini-btn.ghost { background: #eef1f8; color: var(--muted); }
.mini-btn:hover { filter: brightness(1.05); }

.type-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.tf {
  border: none; border-radius: 20px; padding: 4px 11px; font-size: 11px;
  font-weight: 700; color: #fff; background: #c2c8d4; cursor: pointer; opacity: .7;
}
.tf.on { opacity: 1; outline: 2px solid #fff; box-shadow: 0 0 0 2px #3b6fd6; }

.pk-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
  gap: 8px; max-height: 46vh; overflow: auto; padding: 4px;
  background: #f4f6fb; border-radius: 12px;
}
.pk {
  position: relative; background: #fff; border: 2px solid #e3e8f2; border-radius: 10px;
  padding: 6px 4px 5px; text-align: center; cursor: pointer; transition: .12s; user-select: none;
}
.pk:hover { transform: translateY(-2px); border-color: var(--accent2); }
.pk.sel { border-color: var(--accent2); background: #eef3ff; box-shadow: 0 0 0 2px #3b6fd6 inset; }
.pk-check {
  position: absolute; top: -7px; right: -7px; width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent2); color: #fff; font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow);
}
.pk-art {
  height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 3px;
}
.pk-art img { width: 44px; height: 44px; object-fit: contain; image-rendering: pixelated; }
.pk-fb {
  display: none; width: 34px; height: 34px; border-radius: 50%;
  background: radial-gradient(circle at 50% 38%, #fff 0 30%, #e3534a 31% 100%);
  border: 2px solid #fff; color: #fff; font-weight: 800; font-size: 12px;
  align-items: center; justify-content: center;
}
.pk-name { font-size: 11px; font-weight: 700; color: var(--ink); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; }
.pk-types { display: flex; gap: 3px; justify-content: center; margin-top: 2px; flex-wrap: wrap; }
.pk-types .type-chip { font-size: 9px; padding: 1px 6px; }

.pick-foot { font-size: 12px; color: var(--muted); margin-top: 10px; text-align: center; }
.pick-foot b { color: var(--accent2); font-size: 14px; }

.setup-actions { display: flex; justify-content: center; margin-top: 14px; }
.start-btn { font-size: 16px; padding: 12px 36px; }
.start-btn:disabled { background: #c9cfdb; color: #fff; box-shadow: none; cursor: not-allowed; }

/* ===== Battle animations ===== */
#fx { position: fixed; inset: 0; pointer-events: none; z-index: 60; overflow: hidden; }
.dmg-num {
  position: absolute; transform: translate(-50%, -50%); font-weight: 900; font-size: 30px;
  color: #fff; text-shadow: 0 2px 0 #00000055, 0 0 8px #00000088;
  animation: floatUp 1s ease-out forwards;
}
.dmg-num.sup { color: #ffe14d; text-shadow: 0 2px 0 #b8860b, 0 0 12px #ffd400; }
.dmg-num.weak { color: #c8f0c8; text-shadow: 0 2px 0 #2f6b2f, 0 0 10px #4caf50; }
.dmg-txt {
  position: absolute; transform: translate(-50%, -50%); font-weight: 800; font-size: 15px;
  color: #fff; text-shadow: 0 1px 3px #0008; animation: floatUp 1.1s ease-out forwards;
  white-space: nowrap;
}
.dmg-txt.weak { color: #c8f0c8; }
.dmg-txt.energy { color: #ffe27a; font-size: 17px; }
.dmg-txt.ko {
  color: #ff5a4d; font-size: 30px; font-weight: 900; letter-spacing: 2px;
  text-shadow: 0 2px 6px #000a; animation: koPop 1.3s ease-out forwards;
}
.impact {
  position: absolute; width: 16px; height: 16px; transform: translate(-50%, -50%);
  border-radius: 50%; background: radial-gradient(circle, #fff 0 30%, #ffd400 40%, transparent 70%);
  animation: burst .38s ease-out forwards;
}
.impact.sup { background: radial-gradient(circle, #fff 0 30%, #ffd400 40%, transparent 70%); }
.impact.weak { background: radial-gradient(circle, #fff 0 30%, #4caf50 40%, transparent 70%); }
.flash {
  position: absolute; inset: 0; animation: flashfx .32s ease-out forwards;
}
.flash.sup { background: radial-gradient(circle, transparent 40%, #ffd40055 100%); }
.flash.weak { background: radial-gradient(circle, transparent 40%, #4caf5055 100%); }

@keyframes floatUp {
  0% { opacity: 0; transform: translate(-50%, -20%) scale(.6); }
  20% { opacity: 1; transform: translate(-50%, -60%) scale(1.15); }
  100% { opacity: 0; transform: translate(-50%, -150%) scale(1); }
}
@keyframes koPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(.4) rotate(-8deg); }
  25% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(3deg); }
  70% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
  100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
}
@keyframes burst {
  0% { opacity: .9; transform: translate(-50%, -50%) scale(.4); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(3.4); }
}
@keyframes flashfx {
  0% { opacity: 0; } 35% { opacity: 1; } 100% { opacity: 0; }
}

/* attacker lunge */
.card.lunge-r { animation: lungeR .26s ease-out; }
.card.lunge-l { animation: lungeL .26s ease-out; }
@keyframes lungeR {
  0% { transform: translateX(0); } 45% { transform: translateX(26px) scale(1.04); } 100% { transform: translateX(0); }
}
@keyframes lungeL {
  0% { transform: translateX(0); } 45% { transform: translateX(-26px) scale(1.04); } 100% { transform: translateX(0); }
}
.card.hit-shake { animation: shake .42s ease-in-out; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-7px) rotate(-1deg); }
  40% { transform: translateX(6px) rotate(1deg); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(4px); }
}
.card.energy-gain { animation: glow .7s ease-out; }
@keyframes glow {
  0% { box-shadow: var(--shadow); }
  35% { box-shadow: 0 0 0 3px #ffd40088, 0 0 22px #ffd400cc, var(--shadow); }
  100% { box-shadow: var(--shadow); }
}
.card.slide-in { animation: slideIn .4s ease-out; }
@keyframes slideIn {
  0% { opacity: 0; transform: translateY(-18px) scale(.96); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.card.faint { animation: faint .7s ease-in forwards; }
@keyframes faint {
  0% { opacity: 1; transform: translateY(0) rotate(0); }
  25% { transform: translateX(-6px) rotate(-3deg); }
  55% { transform: translateX(6px) rotate(3deg); }
  100% { opacity: 0; transform: translateY(22px) scale(.85) rotate(-8deg); filter: grayscale(1); }
}

@media (prefers-reduced-motion: reduce) {
  .card.lunge-r, .card.lunge-l, .card.hit-shake, .card.energy-gain,
  .card.slide-in, .card.faint, .dmg-num, .dmg-txt, .impact, .flash { animation-duration: .01s; }
}

@media (max-width: 760px) {
  .field { grid-template-columns: 1fr; }
  .vs { display:none; }
  .side.ai { align-items:flex-start; }
  .actions { grid-template-columns: 1fr; }
}

</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="title">
      <div class="logo"></div>
      <div>
        <h1>宝可梦卡牌对战</h1>
        <small>初代 151 只宝可梦 · 属性克制 · 你 VS 电脑</small>
      </div>
    </div>
    <button class="btn ghost" onclick="PK.toSetup()">重选宝可梦</button>
  </header>
  <div class="field">
    <div class="side you" id="you-side"></div>
    <div class="vs">VS</div>
    <div class="side ai" id="ai-side"></div>
  </div>
  <div class="actions">
    <div class="move-area">
      <div class="ttl" id="turn-indicator">准备中…</div>
      <div class="moves" id="moves"></div>
      <div class="switch-hint" id="switch-hint"></div>
    </div>
    <div class="log-area">
      <div class="ttl">战斗记录</div>
      <div class="log" id="log"></div>
    </div>
  </div>
  <div class="foot">提示：绿色技能代表克制当前对手，能量不足的技能会变灰。</div>
</div>
<div class="overlay" id="overlay"><div class="over-box" id="over-box"></div></div>
<div class="overlay setup" id="setup">
  <div class="setup-box">
    <button class="setup-close" id="setup-close">✕</button>
    <h2>组建你的宝可梦战队</h2>
    <p class="setup-sub">从初代 151 只中选择，或让系统随机分配。</p>
    <div class="setup-modes">
      <button class="seg" id="seg-random">⚡ 随机组队</button>
      <button class="seg" id="seg-custom">✋ 自选 12 只</button>
    </div>
    <div id="custom-panel" class="hidden">
      <div class="picker-tools">
        <input id="pk-search" class="pk-search" placeholder="搜索名字或编号…" />
        <div class="pk-tools-btns">
          <button class="mini-btn" id="pk-fill">随机补全</button>
          <button class="mini-btn ghost" id="pk-clear">清空</button>
        </div>
      </div>
      <div id="pk-types" class="type-filters"></div>
      <div id="pk-grid" class="pk-grid"></div>
      <div class="pick-foot">已选 <b id="pick-count">0</b> / 12</div>
    </div>
    <div class="setup-actions"><button class="btn start-btn" id="start-btn">开始对战</button></div>
  </div>
</div>
<div id="fx"></div>

<script>
/* 宝可梦卡牌对战 — game logic (vanilla JS) */
(function () {
  "use strict";

  var LIST = window.POKEMON_LIST;
  var EFFECT = window.TYPE_EFFECT;
  var TYPE_ZH = window.TYPE_ZH;

  var TYPE_COLOR = {
    normal:"#A8A878", fire:"#F08030", water:"#6890F0", electric:"#F8D030",
    grass:"#78C850", ice:"#98D8D8", fighting:"#C03028", poison:"#A040A0",
    ground:"#E0C068", flying:"#A890F0", psychic:"#F85888", bug:"#A8B820",
    rock:"#B8A038", ghost:"#705898", dragon:"#7038F8"
  };

  // physical / special move name per type
  var MOVE_NAME = {
    normal:["撞击","舍身冲撞"], fire:["火花","喷射火焰"], water:["水枪","水炮"],
    electric:["电击","十万伏特"], grass:["藤鞭","飞叶快刀"], ice:["冰砾","冰冻光束"],
    fighting:["手刀","百万吨重拳"], poison:["毒针","污泥炸弹"], ground:["泥巴射击","地震"],
    flying:["啄","空气斩"], psychic:["念力","精神强念"], bug:["虫咬","虫鸣"],
    rock:["落石","岩石封锁"], ghost:["影子拳","暗影球"], dragon:["龙息","龙之波动"]
  };

  var DECK_SIZE = 12;
  var BENCH_START = 4;
  var MAX_ENERGY = 3;

  var state = null;
  var busy = false;
  var setup = { mode: "random", selected: [], typeFilter: "all", query: "" };

  if (typeof console !== "undefined" && console.log) {
    console.log("[PK] v4 loaded: synchronous battle flow (animations disabled)");
  }

  /* ---------- helpers ---------- */
  function shuffle(a) {
    a = a.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function typeMult(moveType, defTypes) {
    var m = 1;
    for (var i = 0; i < defTypes.length; i++) {
      var row = EFFECT[moveType];
      if (row && row[defTypes[i]] !== undefined) m *= row[defTypes[i]];
    }
    return m;
  }
  function genMoves(mon) {
    var t1 = mon.types[0];
    var t2 = mon.types[1] || "normal";
    var p1 = clamp(Math.round(mon.attack * 0.55) + 20, 40, 100);
    var p2 = clamp(Math.round(mon.sp_attack * 0.55) + 20, 40, 100);
    return [
      { name: MOVE_NAME[t1][0], type: t1, power: p1, cost: 1, cat: "phys" },
      { name: MOVE_NAME[t2][1] || MOVE_NAME[t2][0], type: t2, power: p2, cost: 2, cat: "spec" }
    ];
  }
  function makeCard(mon) {
    return {
      mon: mon, maxHp: mon.hp, hp: mon.hp, energy: 0,
      fainted: false, moves: genMoves(mon)
    };
  }
  function randomMons(n) {
    return shuffle(LIST).slice(0, n);
  }

  /* ---------- setup ---------- */
  function buildState(youMons, aiMons) {
    function buildPlayer(name, pool) {
      var cards = pool.map(makeCard);
      var active = cards[0];
      var bench = cards.slice(1, 1 + BENCH_START);
      var deck = cards.slice(1 + BENCH_START);
      return { name: name, active: active, bench: bench, deck: deck };
    }
    state = {
      you: buildPlayer("你", youMons),
      ai: buildPlayer("电脑", aiMons),
      turn: "you", over: false, winner: null, log: []
    };
  }

  function newGame(youMons) {
    var youPool = (youMons && youMons.length === DECK_SIZE)
      ? youMons.slice()
      : randomMons(DECK_SIZE);
    var used = {};
    youPool.forEach(function (m) { used[m.id] = true; });
    var rest = LIST.filter(function (m) { return !used[m.id]; });
    var aiPool = shuffle(rest).slice(0, DECK_SIZE);
    buildState(youPool, aiPool);
    log("sys", "对战开始！双方各派出一只宝可梦，先让对方无宝可梦可派者获胜。");
    render();
  }

  function beginGame(youMons) {
    hideOverlays();
    setup.selected = [];
    newGame(youMons);
    startTurn("you");
  }

  /* ---------- logging ---------- */
  function log(cls, msg) {
    state.log.push({ cls: cls, msg: msg });
    if (state.log.length > 40) state.log.shift();
  }

  /* ---------- combat ---------- */
  function expectedDamage(attacker, defender, move) {
    var atk = move.cat === "phys" ? attacker.mon.attack : attacker.mon.sp_attack;
    var def = move.cat === "phys" ? defender.mon.defense : defender.mon.sp_defense;
    var mult = typeMult(move.type, defender.mon.types);
    return Math.max(1, Math.floor(move.power * (atk / (def + 10)) * 0.5 * mult));
  }
  function rollDamage(attacker, defender, move) {
    var atk = move.cat === "phys" ? attacker.mon.attack : attacker.mon.sp_attack;
    var def = move.cat === "phys" ? defender.mon.defense : defender.mon.sp_defense;
    var mult = typeMult(move.type, defender.mon.types);
    var variance = 0.85 + Math.random() * 0.15;
    var dmg = Math.max(1, Math.floor(move.power * (atk / (def + 10)) * 0.5 * mult * variance));
    return { dmg: dmg, mult: mult };
  }

  function useMove(side, moveIdx) {
    var me = state[side];
    var foe = state[side === "you" ? "ai" : "you"];
    var foeSide = side === "you" ? "ai" : "you";
    var attacker = me.active, defender = foe.active;
    var move = attacker.moves[moveIdx];
    if (attacker.energy < move.cost) return;
    attacker.energy -= move.cost;

    var r = rollDamage(attacker, defender, move);
    defender.hp = Math.max(0, defender.hp - r.dmg);

    var effTxt = r.mult >= 2 ? "效果拔群！" : r.mult === 0 ? "没有效果…"
      : r.mult < 1 ? "效果不太好…" : "";
    var who = side === "you" ? "你" : "电脑";
    var line = who + "的" + attacker.mon.name_zh + " 使用【" + move.name + "】，对" +
               defender.mon.name_zh + " 造成 " + r.dmg + " 点伤害。" + effTxt;
    log(side, line);

    // --- sync: update state & render immediately ---
    if (defender.hp <= 0) {
      handleFaint(foeSide);
    }
    render();

    // --- advance turn ---
    if (!state.over) afterMove(side);
  }

  function afterMove(side) {
    if (state.over) return;
    if (side === "you") endHumanTurn();
    else startTurn("you");
  }

  function handleFaint(side) {
    var p = state[side];
    var dead = p.active;
    dead.fainted = true;
    log("kill", p.name + "的" + dead.mon.name_zh + " 倒下了！");

    if (p.bench.length > 0) {
      var best = 0;
      for (var i = 1; i < p.bench.length; i++) {
        if (p.bench[i].hp > p.bench[best].hp) best = i;
      }
      var promoted = p.bench.splice(best, 1)[0];
      p.active = promoted;
      log("sys", p.name + " 派出 " + promoted.mon.name_zh + " 上场！");
    } else if (p.deck.length > 0) {
      p.active = p.deck.shift();
      log("sys", p.name + " 从牌库抽出 " + p.active.mon.name_zh + " 上场！");
    } else {
      state.over = true;
      state.winner = side === "you" ? "ai" : "you";
      log("kill", p.name + " 已无宝可梦可派，" + (state.winner === "you" ? "你" : "电脑") + " 获胜！");
      render();
      showOver();
      return;
    }
    render();
  }

  function doSwitch(side, benchIdx) {
    var p = state[side];
    if (benchIdx < 0 || benchIdx >= p.bench.length) return;
    var incoming = p.bench.splice(benchIdx, 1)[0];
    p.bench.push(p.active);
    p.active = incoming;
    var who = side === "you" ? "你" : "电脑";
    log("sys", who + " 换上 " + incoming.mon.name_zh + "（" + p.active.mon.name_zh + " 退居后备）。");
  }

  /* ---------- turn flow (fully synchronous — zero setTimeout) ---------- */
  function startTurn(side) {
    if (state.over) return;
    var p = state[side];
    p.active.energy = Math.min(MAX_ENERGY, p.active.energy + 1);
    state.turn = side;
    busy = side === "ai";
    render();
    if (side === "ai") {
      aiAct();
    }
  }

  function endHumanTurn() {
    if (state.over) return;
    busy = true;
    render();
    startTurn("ai");
  }

  function aiAct() {
    if (state.over) { busy = false; return; }
    var me = state.ai, foe = state.you;
    var a = me.active, d = foe.active;

    var choices = [];
    for (var i = 0; i < a.moves.length; i++) {
      var mv = a.moves[i];
      if (a.energy < mv.cost) continue;
      var exp = expectedDamage(a, d, mv);
      choices.push({ i: i, exp: exp, ko: exp >= d.hp });
    }
    if (choices.length === 0) {
      busy = false; startTurn("you"); return;
    }
    choices.sort(function (x, y) { return (y.ko - x.ko) || (y.exp - x.exp); });
    var pick = choices[0];

    if (!pick.ko && a.hp / a.maxHp < 0.35 && me.bench.length > 0) {
      var bestBench = 0;
      for (var j = 1; j < me.bench.length; j++) {
        if (me.bench[j].maxHp > me.bench[bestBench].maxHp) bestBench = j;
      }
      if (me.bench[bestBench].maxHp > a.maxHp) {
        doSwitch("ai", bestBench);
        render();
        busy = false;
        startTurn("you");
        return;
      }
    }

    // useMove is now fully synchronous
    useMove("ai", pick.i);
  }

  /* human actions */
  function onMove(idx) {
    if (busy || state.over || state.turn !== "you") return;
    busy = true;
    useMove("you", idx);
  }
  function onSwitch(idx) {
    if (busy || state.over || state.turn !== "you") return;
    busy = true;
    doSwitch("you", idx);
    render();
    endHumanTurn();
  }

  /* ---------- animations (browser only; guarded for headless) ---------- */
  function fxLayer() {
    if (typeof document === "undefined" || !document.body) return null;
    var fx = document.getElementById("fx");
    if (!fx) { fx = document.createElement("div"); fx.id = "fx"; document.body.appendChild(fx); }
    return fx;
  }
  function elId(side) { return side === "you" ? "you-active-card" : "ai-active-card"; }
  function centerOf(el) {
    if (el && typeof el.getBoundingClientRect === "function") {
      var r = el.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    return { x: (window.innerWidth || 600) / 2, y: (window.innerHeight || 600) / 2 };
  }

  function animateStrike(side, move, r) {
    try {
      var fx = fxLayer();
      if (!fx) return;
      var atk = document.getElementById(elId(side));
      var def = document.getElementById(elId(side === "you" ? "ai" : "you"));
      if (atk) atk.classList.add(side === "you" ? "lunge-r" : "lunge-l");

      setTimeout(function () {
        try {
          if (def) {
            def.classList.add("hit-shake");
            setTimeout(function () { if (def) def.classList.remove("hit-shake"); }, 420);
          }
          spawnDamage(def, r);
          flashEffect(r.mult);
        } catch(e2) { console.warn("[PK] strike cb:", e2); }
      }, IMPACT_MS);
    } catch(e) { console.warn("[PK] animateStrike:", e); }
  }

  function spawnDamage(defEl, r) {
    try {
      var fx = fxLayer(); if (!fx) return;
      var c = centerOf(defEl);
      var d = document.createElement("div");
      d.className = "dmg-num " + (r.mult >= 2 ? "sup" : r.mult < 1 ? "weak" : "");
      d.textContent = "-" + r.dmg;
      d.style.left = (c.x + (Math.random() * 24 - 12)) + "px";
      d.style.top = (c.y - 20) + "px";
      fx.appendChild(d);
      setTimeout(function () { try { if (d && d.parentNode) d.parentNode.removeChild(d); }catch(_){} }, 1000);

      if (r.mult === 0) {
        var no = document.createElement("div");
        no.className = "dmg-txt weak";
        no.textContent = "没有效果";
        no.style.left = c.x + "px"; no.style.top = (c.y + 16) + "px";
        fx.appendChild(no);
        setTimeout(function () { try { if (no && no.parentNode) no.parentNode.removeChild(no); }catch(_){} }, 1100);
      }
      if (defEl) {
        var burst = document.createElement("div");
        burst.className = "impact " + (r.mult >= 2 ? "sup" : r.mult < 1 ? "weak" : "");
        burst.style.left = c.x + "px"; burst.style.top = c.y + "px";
        fx.appendChild(burst);
        setTimeout(function () { try { if (burst && burst.parentNode) burst.parentNode.removeChild(burst); }catch(_){} }, 380);
      }
    } catch(e) { console.warn("[PK] spawnDamage:", e); }
  }

  function flashEffect(mult) {
    try {
      var fx = fxLayer(); if (!fx || mult === 1) return;
      var f = document.createElement("div");
      f.className = "flash " + (mult >= 2 ? "sup" : "weak");
      fx.appendChild(f);
      setTimeout(function () { try { if (f && f.parentNode) f.parentNode.removeChild(f); }catch(_){} }, 320);
    } catch(e) { console.warn("[PK] flash:", e); }
  }

  function animateFaint(side) {
    try {
      var fx = fxLayer(); if (!fx) return;
      var card = document.getElementById(elId(side));
      if (card) {
        card.classList.add("faint");
        var c = centerOf(card);
        var ko = document.createElement("div");
        ko.className = "dmg-txt ko"; ko.textContent = "K.O.";
        ko.style.left = c.x + "px"; ko.style.top = c.y + "px";
        fx.appendChild(ko);
        setTimeout(function () { try { if (ko && ko.parentNode) ko.parentNode.removeChild(ko); }catch(_){} }, 1400);
      }
    } catch(e) { console.warn("[PK] faint:", e); }
  }

  function animateEnergy(side) {
    try {
      var fx = fxLayer(); if (!fx) return;
      var card = document.getElementById(elId(side));
      if (card) card.classList.add("energy-gain");
      var c = centerOf(card);
      var p = document.createElement("div");
      p.className = "dmg-txt energy"; p.textContent = "⚡+1";
      p.style.left = (c.x + 60) + "px"; p.style.top = (c.y - 40) + "px";
      fx.appendChild(p);
      setTimeout(function () { try { if (p && p.parentNode) p.parentNode.removeChild(p); }catch(_){} }, 900);
    } catch(e) { console.warn("[PK] energy:", e); }
  }

  function animateSwitch(side) {
    var card = document.getElementById(elId(side));
    if (card) card.classList.add("slide-in");
  }

  function hideOverlays() {
    var ov = document.getElementById("overlay");
    var su = document.getElementById("setup");
    if (ov) ov.classList.remove("show");
    if (su) su.classList.remove("show");
  }

  /* ---------- rendering ---------- */
  function typeChips(types) {
    return types.map(function (t) {
      return '<span class="type-chip" style="background:' + (TYPE_COLOR[t] || "#888") + '">' +
        (TYPE_ZH[t] || t) + "</span>";
    }).join("");
  }
  function hpColor(ratio) {
    return ratio > 0.5 ? "var(--hp-good)" : ratio > 0.22 ? "var(--hp-mid)" : "var(--hp-low)";
  }
  function energyDots(n) {
    var s = "";
    for (var i = 0; i < MAX_ENERGY; i++) {
      s += '<span class="dot' + (i < n ? " on" : "") + '"></span>';
    }
    return s;
  }

  function cardHTML(side, p, withEnergy) {
    var c = p.active;
    var ratio = c.hp / c.maxHp;
    var headColor = TYPE_COLOR[c.mon.types[0]] || "#555";
    var en = withEnergy
      ? '<div class="energy"><span class="lbl">能量</span>' + energyDots(c.energy) + "</div>"
      : "";
    return '' +
      '<div class="card" id="' + elId(side) + '" style="border-color:' + headColor + '">' +
        '<div class="head" style="background:' + headColor + '">' +
          '<span class="nm">' + c.mon.name_zh + '</span>' +
          '<span class="no">#' + ("00" + c.mon.id).slice(-3) + '</span>' +
        '</div>' +
        '<div class="art">' +
          '<img src="' + c.mon.sprite + '" alt="' + c.mon.name_zh + '" ' +
            'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
          '<div class="fallback">' + c.mon.id + '</div>' +
        '</div>' +
        '<div class="types">' + typeChips(c.mon.types) + '</div>' +
        '<div class="body">' +
          '<div class="hp-row"><span>HP</span>' +
            '<div class="hp-bar"><div class="hp-fill" style="width:' + (ratio * 100) +
              '%;background:' + hpColor(ratio) + '"></div></div>' +
            '<span>' + c.hp + "/" + c.maxHp + '</span>' +
          '</div>' + en +
        '</div>' +
      '</div>';
  }

  function benchHTML(p, switchable) {
    if (p.bench.length === 0) return '<div class="deck-pile"><span class="pile"></span><span>后备 0</span></div>';
    var html = p.bench.map(function (c, i) {
      var ratio = c.hp / c.maxHp;
      var hc = TYPE_COLOR[c.mon.types[0]] || "#555";
      return '' +
        '<div class="mini' + (switchable ? " switchable" : "") + '"' +
            (switchable ? ' data-switch="' + i + '" title="点击换上这只宝可梦"' : "") + '>' +
          '<div class="mh" style="background:' + hc + '"><span>' + c.mon.name_zh + '</span>' +
            '<span>#' + ("00" + c.mon.id).slice(-3) + '</span></div>' +
          '<div class="ma"><img src="' + c.mon.sprite + '" alt="' + c.mon.name_zh + '" ' +
            'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
            '<div class="fb"></div></div>' +
          '<div class="mb">' +
            '<div class="mhp"><i style="width:' + (ratio * 100) + '%;background:' + hpColor(ratio) + '"></i></div>' +
            '<div class="mname">' + c.hp + "/" + c.maxHp + '</div>' +
          '</div>' +
        '</div>';
    }).join("");
    return html;
  }

  function movesHTML() {
    var p = state.you;
    var c = p.active;
    var d = state.ai.active;
    var canAct = !busy && !state.over && state.turn === "you";
    var html = c.moves.map(function (mv, i) {
      var mult = typeMult(mv.type, d.mon.types);
      var effCls = mult >= 2 ? "sup" : mult < 1 ? "weak" : "";
      var effTxt = mult >= 2 ? "克制 ×" + mult : mult === 0 ? "无效" : mult < 1 ? "被抵抗 ×" + mult : "";
      var disabled = !canAct || c.energy < mv.cost;
      var costColor = c.energy >= mv.cost ? "" : ' style="color:#e3534a"';
      return '' +
        '<button class="move" data-move="' + i + '"' + (disabled ? " disabled" : "") + '>' +
          '<div class="mn"><span class="type-chip" style="background:' + (TYPE_COLOR[mv.type] || "#888") + '">' +
            (TYPE_ZH[mv.type] || mv.type) + '</span>' + mv.name +
            '<span class="cost"' + costColor + '>能量 ' + mv.cost + '</span></div>' +
          '<div class="md"><span>威力 ' + mv.power + '</span><span>' +
            (mv.cat === "phys" ? "物理" : "特殊") + '</span></div>' +
          (effTxt ? '<div class="eff ' + effCls + '">' + effTxt + '</div>' : "") +
        '</button>';
    }).join("");
    return html;
  }

  function logHTML() {
    var items = state.log.slice(-14).map(function (e) {
      return '<div class="e ' + e.cls + '">' + e.msg + '</div>';
    }).join("");
    return items;
  }

  function render() {
    if (!state) return;
    var you = state.you, ai = state.ai;
    var ys = document.getElementById("you-side");
    var as = document.getElementById("ai-side");
    if (ys) ys.innerHTML =
      '<div class="side-label"><span>你</span><span class="tag">牌库 ' + you.deck.length +
      '</span></div>' + cardHTML("you", you, true) +
      '<div class="bench">' + benchHTML(you, state.turn === "you" && !busy && !state.over) + '</div>';
    if (as) as.innerHTML =
      '<div class="side-label"><span>电脑</span><span class="tag">牌库 ' + ai.deck.length +
      '</span></div>' + cardHTML("ai", ai, true) +
      '<div class="bench">' + benchHTML(ai, false) + '</div>';

    var turnTxt = state.over ? "对战结束" : (state.turn === "you" ? "你的回合" : "电脑思考中…");
    var ti = document.getElementById("turn-indicator");
    if (ti) ti.textContent = turnTxt;

    var mv = document.getElementById("moves");
    if (mv) mv.innerHTML = movesHTML();
    var lg = document.getElementById("log");
    if (lg) lg.innerHTML = logHTML();

    var canAct = !busy && !state.over && state.turn === "you";
    var hint = canAct
      ? '点击技能发动攻击，或点击下方后备宝可梦换上场。每只宝可梦每回合自动获得 1 点能量（上限 ' + MAX_ENERGY + '）。'
      : (state.over ? "点击「重选宝可梦」再来一局。" : "请稍候，电脑正在行动…");
    var sh = document.getElementById("switch-hint");
    if (sh) sh.innerHTML = hint;

    bindEvents();
  }

  function bindEvents() {
    var ms = document.querySelectorAll("[data-move]");
    for (var i = 0; i < ms.length; i++) {
      (function (el) {
        el.addEventListener("click", function () { onMove(parseInt(el.getAttribute("data-move"), 10)); });
      })(ms[i]);
    }
    var sw = document.querySelectorAll("[data-switch]");
    for (var j = 0; j < sw.length; j++) {
      (function (el) {
        el.addEventListener("click", function () { onSwitch(parseInt(el.getAttribute("data-switch"), 10)); });
      })(sw[j]);
    }
  }

  function showOver() {
    var ov = document.getElementById("overlay");
    var box = document.getElementById("over-box");
    if (!ov || !box) return;
    var youWin = state.winner === "you";
    box.innerHTML =
      '<div class="emoji">' + (youWin ? "🏆" : "💥") + '</div>' +
      '<h2>' + (youWin ? "你赢了！" : "你输了…") + '</h2>' +
      '<p>' + (youWin ? "你的宝可梦战队笑到了最后。" : "电脑的宝可梦战队更胜一筹，再接再厉！") + '</p>' +
      '<button class="btn" onclick="PK.toSetup()">重选宝可梦</button>';
    ov.classList.add("show");
  }

  /* ---------- setup screen ---------- */
  function showSetup() {
    var su = document.getElementById("setup");
    if (!su) return;
    su.classList.add("show");
    setup.selected = [];
    setup.mode = "random";
    setup.typeFilter = "all";
    setup.query = "";
    syncSetupUI();
    renderPicker();
    renderTypeFilters();
  }

  function syncSetupUI() {
    var segR = document.getElementById("seg-random");
    var segC = document.getElementById("seg-custom");
    var panel = document.getElementById("custom-panel");
    var start = document.getElementById("start-btn");
    if (segR) segR.classList.toggle("active", setup.mode === "random");
    if (segC) segC.classList.toggle("active", setup.mode === "custom");
    if (panel) panel.classList.toggle("hidden", setup.mode !== "custom");
    if (start) {
      if (setup.mode === "custom") {
        start.disabled = setup.selected.length !== DECK_SIZE;
        start.textContent = setup.selected.length === DECK_SIZE
          ? "开始对战 (" + DECK_SIZE + ")" : "请选满 " + setup.selected.length + "/" + DECK_SIZE;
      } else {
        start.disabled = false;
        start.textContent = "开始对战（随机）";
      }
    }
    var cnt = document.getElementById("pick-count");
    if (cnt) cnt.textContent = setup.selected.length;
  }

  function renderTypeFilters() {
    var wrap = document.getElementById("pk-types");
    if (!wrap) return;
    var html = '<button class="tf' + (setup.typeFilter === "all" ? " on" : "") + '" data-tf="all">全部</button>';
    Object.keys(TYPE_ZH).forEach(function (t) {
      html += '<button class="tf' + (setup.typeFilter === t ? " on" : "") + '" data-tf="' + t +
        '" style="background:' + (TYPE_COLOR[t] || "#888") + '">' + (TYPE_ZH[t]) + '</button>';
    });
    wrap.innerHTML = html;
    var btns = wrap.querySelectorAll("[data-tf]");
    for (var i = 0; i < btns.length; i++) {
      (function (el) {
        el.addEventListener("click", function () {
          setup.typeFilter = el.getAttribute("data-tf");
          renderTypeFilters();
          renderPicker();
        });
      })(btns[i]);
    }
  }

  function renderPicker() {
    var grid = document.getElementById("pk-grid");
    if (!grid) return;
    var q = setup.query.trim().toLowerCase();
    var selIds = {};
    setup.selected.forEach(function (m) { selIds[m.id] = true; });
    var html = "";
    LIST.forEach(function (m) {
      var matchType = setup.typeFilter === "all" || m.types.indexOf(setup.typeFilter) >= 0;
      var matchQ = !q || m.name_zh.indexOf(q) >= 0 || m.name.indexOf(q) >= 0 ||
        String(m.id) === q || ("#" + m.id) === q;
      if (!matchType || !matchQ) return;
      var sel = selIds[m.id];
      var hc = TYPE_COLOR[m.types[0]] || "#555";
      html += '<div class="pk' + (sel ? " sel" : "") + '" data-pk="' + m.id + '">' +
        (sel ? '<div class="pk-check">✓</div>' : '') +
        '<div class="pk-art" style="background:' + hc + '22">' +
          '<img src="' + m.sprite + '" alt="' + m.name_zh + '" ' +
            'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
          '<div class="pk-fb">' + m.id + '</div>' +
        '</div>' +
        '<div class="pk-name">' + m.name_zh + '</div>' +
        '<div class="pk-types">' + typeChips(m.types) + '</div>' +
      '</div>';
    });
    grid.innerHTML = html;
    var cells = grid.querySelectorAll("[data-pk]");
    for (var i = 0; i < cells.length; i++) {
      (function (el) {
        el.addEventListener("click", function () {
          togglePick(parseInt(el.getAttribute("data-pk"), 10));
        });
      })(cells[i]);
    }
  }

  function togglePick(id) {
    var idx = -1;
    for (var i = 0; i < setup.selected.length; i++) {
      if (setup.selected[i].id === id) { idx = i; break; }
    }
    if (idx >= 0) {
      setup.selected.splice(idx, 1);
    } else {
      if (setup.selected.length >= DECK_SIZE) return; // full
      for (var k = 0; k < LIST.length; k++) {
        if (LIST[k].id === id) { setup.selected.push(LIST[k]); break; }
      }
    }
    syncSetupUI();
    renderPicker();
  }

  function confirmStart() {
    if (setup.mode === "custom") {
      if (setup.selected.length !== DECK_SIZE) return;
      beginGame(setup.selected.slice());
    } else {
      beginGame(null);
    }
  }

  /* ---------- wiring setup events ---------- */
  function wireSetup() {
    var segR = document.getElementById("seg-random");
    var segC = document.getElementById("seg-custom");
    var start = document.getElementById("start-btn");
    var search = document.getElementById("pk-search");
    var clearBtn = document.getElementById("pk-clear");
    var fillBtn = document.getElementById("pk-fill");
    var closeBtn = document.getElementById("setup-close");
    if (segR) segR.addEventListener("click", function () { setup.mode = "random"; syncSetupUI(); });
    if (segC) segC.addEventListener("click", function () { setup.mode = "custom"; syncSetupUI(); });
    if (start) start.addEventListener("click", confirmStart);
    if (search) search.addEventListener("input", function () {
      setup.query = search.value || ""; renderPicker();
    });
    if (clearBtn) clearBtn.addEventListener("click", function () {
      setup.selected = []; syncSetupUI(); renderPicker();
    });
    if (fillBtn) fillBtn.addEventListener("click", function () {
      var pool = shuffle(LIST);
      setup.selected = pool.slice(0, DECK_SIZE);
      syncSetupUI(); renderPicker();
    });
    if (closeBtn) closeBtn.addEventListener("click", function () {
      // resume current game if exists, else start random
      if (state && !state.over) { hideOverlays(); }
      else { beginGame(null); }
    });
  }

  window.PK = {
    start: function () { showSetup(); },
    restart: function () {
      document.getElementById("overlay").classList.remove("show");
      var su = document.getElementById("setup");
      if (su) su.classList.remove("show");
      busy = false;
      newGame(null); startTurn("you");
    }, // headless/test: random game
    toSetup: function () { showSetup(); },
    _state: function () { return state; },
    _useMove: onMove,
    _switch: onSwitch,
    _beginCustom: function (mons) { beginGame(mons); }
  };

  // boot
  if (typeof document !== "undefined" && document.getElementById) {
    wireSetup();
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () { showSetup(); });
    } else {
      showSetup();
    }
  }
})();

</script>
</body>
</html>
